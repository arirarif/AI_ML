# 🧠 AI/ML Learning Roadmap

## ⏱️ Total Watch Time
- ✅ **Core path ~110h** (one main resource per topic)
- 📚 **Everything listed ~415h** (incl. reference playlists, no Bangla)
- ⚡ Real effort = **2–4× watch time** (pause + code along) → ~250–450h
- ### Per phase (core)
  - Phase 0 (Math + Python) ~25–30h
  - Phase 1 (Data tools) ~6–8h
  - Phase 2 (Classical ML) ~15–20h + SQL/Git ~5h
  - Phase 3 (Deep Learning) ~25–40h
  - Phase 4 (CNN/RNN/Transformers) ~8–12h
  - NLP ~5–8h · LLMs ~2–3h · GenAI ~10–15h
- 📌 Big playlists (CampusX ML ~90h, CampusX DL ~40h, Krish Naik ~30h) = **reference, not watch-all**

## ❓ Is the syllabus enough?
- ✅ Curriculum = Grade A (more complete than most bootcamps)
- ⚠️ Missing for jobs
  - SQL (almost every data/ML job)
  - Git / GitHub (public portfolio)
  - Deployment (Docker · FastAPI · cloud)
  - Resume + portfolio (5–6 solid projects)
- 📌 A list ≠ a course → order + projects + practice
- ⏱️ Timeline: 6–10 months (zero) · 3–5 months (coder)

## 📐 Phase 0 — Foundations
- ### Math (intuition, ~3–4 weeks) · ~12h
  - [3Blue1Brown — Linear Algebra](https://www.youtube.com/playlist?list=PLZHQObOWTQDPD3MizzM2xVFitgF8hE_ab) ⏱️ ~3h

- ### Python · ~22h
  - [Harvard CS50P](https://www.youtube.com/watch?v=nLRL_NcnK-4) ⏱️ ~16h

## 🎓 Track 02 — Thesis / Research
- Topic formulation → data strategy → experiments → writing
- Tools: arXiv · Papers With Code · Connected Papers · Zotero
- Stanford CS230 lectures

## 🇧🇩 Bangla Backup
- [Complete ML Bangla Course](https://www.youtube.com/playlist?list=PLKdU0fuY4OFfWY36nDJDlI26jXwInSm8f) ⏱️ ~30h
- [Data Science & AI Bangla](https://www.youtube.com/playlist?list=PLKdU0fuY4OFcot0zyVbM1-zKf_eCUK4zQ) ⏱️ ~40h
- [aiQuest Intelligence](https://aiquest.org/)
- Stack Learner (YouTube)

## 💼 Fast-Track to a Job
- GitHub portfolio (clean READMEs)
- Kaggle competitions/notebooks
- SQL + Git (non-negotiable)
- One deployed app (live URL)
- Resume + LinkedIn (metrics!)
- Re-implement from scratch once
- DSA basics in Python + mock interviews

## 🟢 Missing Basics (Layer 1)
- SQL (joins, window fns, CTEs)
- Git/GitHub + clean READMEs
- CLI + venv/conda environments
- Notebooks → .py scripts
- Light DSA in Python (~50 LeetCode)
- Stats for interviews (A/B, p-values, Bayes)
- BI tool (Power BI / Tableau / Looker)

## 🟡 Pro Engineering (Layer 2)
- ### Deployment
  - FastAPI · Streamlit · Gradio
  - Docker
  - HuggingFace Spaces · Render · cloud
- ### MLOps
  - MLflow / W&B (tracking)
  - DVC (versioning)
  - GitHub Actions (CI/CD)
  - Drift monitoring
- ### Cloud (pick AWS)
  - S3 · EC2 · SageMaker · IAM · Lambda
- ### Better models
  - XGBoost / LightGBM / CatBoost
  - Optuna tuning · cross-validation
  - Imbalanced data (SMOTE, F1/ROC-AUC)
  - SHAP / LIME interpretability
- ### Code hygiene
  - type hints · logging · pytest · project structure

## 🔴 Advanced Edge (Layer 3)
- ### Modern LLM engineering ⭐
  - Advanced RAG (chunking, re-ranking, RAGAS)
  - Vector DBs (Pinecone, Qdrant, Chroma, FAISS)
  - Agents (LangGraph, CrewAI, function calling)
  - Fine-tuning (LoRA / QLoRA / PEFT)
  - Local models (Ollama, vLLM)
  - LLMOps (cost, caching, LangSmith)
- ### Deep learning depth
  - Transformer from scratch
  - CV: YOLO · ViT · segmentation
  - Diffusion models
  - Multimodal (CLIP, LLaVA)
  - Quantization · distillation · ONNX
  - Distributed / multi-GPU training
- ### Research literacy
  - arXiv · Papers With Code weekly
  - Reproduce a paper end-to-end
- ### Pick a specialization
  - GenAI/LLM Engineer (hottest)
  - MLOps Engineer
  - CV / NLP Engineer
  - Data Scientist
- ### Be visible (forward phase)
  - Kaggle → Expert
  - Open-source contribution
  - Build in public (blog / LinkedIn)
  - AI hackathons

## 🧭 Mixed Timeline
- M1–2: Python + Git + CLI
- M3–4: ML + SQL + stats → apply Data Analyst
- M5–6: Deep Learning + FastAPI/Docker + XGBoost
- M7–8: CNN/RNN + MLOps + cloud → apply Jr ML/GenAI
- M9–10: LLMs + advanced RAG/agents/LoRA → deploy
- M11–12+: specialize + reproduce paper + OSS
